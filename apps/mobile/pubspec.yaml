name: echango_promo
description: echango Promo - Application mobile client, commerçant & agent terrain
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.0

  # Navigation
  go_router: ^14.0.0

  # API REST
  dio: ^5.7.0

  # UI
  cached_network_image: ^3.4.0

  # Stockage local (device ID anonyme, favoris, commune sélectionnée)
  shared_preferences: ^2.3.0
  flutter_secure_storage: ^9.2.0
  uuid: ^4.4.0

  # Photo promo (agent) — capture caméra obligatoire, pas de galerie
  image_picker: ^1.1.0

  # Position GPS du commerce (gratuit, pas de clé API Google Maps) et lien
  # "Itinéraire" ouvrant l'app Google Maps côté client
  geolocator: ^13.0.1
  url_launcher: ^6.3.0

  # Compression avant upload — §5.8 des specs
  flutter_image_compress: ^2.3.0
  path_provider: ^2.1.3
  path: ^1.9.0

  # Version non épinglée en dur : flutter_localizations (SDK) impose sa
  # propre contrainte sur intl, liée à la version exacte du SDK Flutter
  # installé — un pin exact (`0.20.2`) peut bloquer `flutter pub get` selon
  # le SDK réellement utilisé (audit vérifiabilité mobile).
  intl: ">=0.19.0 <1.0.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
