services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: echango
      POSTGRES_PASSWORD: echango
      POSTGRES_DB: echango_promo
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./apps/backend
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - ./apps/backend/.env
    ports:
      - '3000:3000'

volumes:
  postgres_data:
